    --_node-stroke:   var(--border, color-mix(in srgb, #cbd5e1 20%, #1e293b));
    --_group-fill:    #1e293b;
    --_group-hdr:     color-mix(in srgb, #cbd5e1 5%, #1e293b);
    --_inner-stroke:  color-mix(in srgb, #cbd5e1 12%, #1e293b);
    --_key-badge:     color-mix(in srgb, #cbd5e1 10%, #1e293b);
  }
</style>
