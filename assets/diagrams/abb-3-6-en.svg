<polyline class="edge" data-from="EH" data-to="L" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="231.28366666666665,406.3 231.28366666666665,394.3 269.78999999999996,394.3 269.78999999999996,76.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="L" data-to="O" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="269.78999999999996,76.9 269.78999999999996,88.9 341.40849999999995,88.9 341.40849999999995,312.95" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
