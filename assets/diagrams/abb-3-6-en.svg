  <text x="209.84249999999997" y="433.2" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="209.84249999999997" dy="-3.9000000000000012">Error handling</tspan><tspan x="209.84249999999997" dy="16.900000000000002">Retry / fallback</tspan></text>
</g>
<g class="node" data-id="O" data-label="Action / result" data-shape="rectangle">
