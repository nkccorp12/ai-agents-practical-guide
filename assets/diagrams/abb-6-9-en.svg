  <text x="500.60949999999997" y="139.65" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Decompose further</text>
</g>
<g class="node" data-id="R" data-label="Recursive LLM calls
per chunk" data-shape="rectangle">
  <rect x="392.1208333333333" y="594.338" width="165.697" height="53.800000000000004" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="474.9693333333333" y="621.2379999999999" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="474.9693333333333" dy="-3.9000000000000012">Recursive LLM calls</tspan><tspan x="474.9693333333333" dy="16.900000000000002">per chunk</tspan></text>
</g>
<g class="node" data-id="G" data-label="Programmatic
